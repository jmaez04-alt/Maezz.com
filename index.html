<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAEZZ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Subtle vintage/textured background overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(24,24,27,0.8) 0%, rgba(10,10,10,1) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 0.25em;
            color: #d4af37; /* Subtle brass/gold tone */
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            padding-left: 0.25em; /* Balances the letter spacing centering */
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #d4af37, transparent);
            margin: 1.5rem auto;
            width: 60%;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #a1a1aa;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: #121212;
            background-color: #e4e4e7;
            border: 1px solid #e4e4e7;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background-color: transparent;
            color: #e4e4e7;
            border-color: #e4e4e7;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Maezz</div>
        <div class="divider"></div>
        <div class="subtitle">Josh's personal collection..</div>
        
        <a href="https://video.maezz.com" class="btn">Login</a>
    </div>

</body>
</html>
